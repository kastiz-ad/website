<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to Kastiz ONE." />
  <meta name="theme-color" content="#ffffff" />
  <script>try{const t=localStorage.getItem("kastiz-one-theme")||"light";document.documentElement.dataset.theme=t;const s=document.createElement("style");s.textContent=`html,body{background:${t==="midnight"?"#121315":t==="gray"?"#3f4146":"#ffffff"}!important}`;document.head.appendChild(s);addEventListener("DOMContentLoaded",()=>s.remove(),{once:true})}catch{}</script>
  <title>Kastiz ONE — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css?v=20260714-20" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="logo" href="index.html" aria-label="Kastiz ONE home"><img src="assets/one-final-circle.png?v=20260713-20" alt="" /><strong>NE</strong></a>
      <nav aria-label="Account">
        <a href="upgrade.html" data-i18n="upgrade">Upgrade</a>
        <a href="settings.html" data-i18n="settings">Settings</a>
      </nav>
    </header>
    <main class="login-container">
      <section class="login-card" aria-labelledby="loginTitle">
        <div class="one-logo" aria-hidden="true"><img src="assets/one-final-circle.png?v=20260713-20" alt="" /><strong>NE</strong></div>
        <h1 id="loginTitle" data-i18n="welcomeBack">Welcome back</h1>
        <p data-i18n="loginSubtitle">Sign in to continue completing real-world missions with ONE.</p>
        <form id="loginForm">
          <div class="field">
            <label for="email" data-i18n="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="password" data-i18n="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button class="primary-button" type="submit" data-i18n="login">Login</button>
        </form>
        <div class="divider" data-i18n="orContinue">or continue with</div>
        <div class="providers" aria-label="Login providers">
          <button class="provider" type="button">Google</button>
          <button class="provider" type="button">Apple</button>
        </div>
        <p class="bottom-text"><span data-i18n="noAccount">Don't have an account?</span><a href="#" data-i18n="createAccount">Create one</a></p>
      </section>
    </main>
  </div>
  <script src="login.js?v=20260714-20" defer></script>
</body>
</html>
