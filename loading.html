<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kastiz ONE is preparing your mission." />
  <meta name="theme-color" content="#ffffff" />
  <title>Kastiz ONE — Preparing Mission</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="loading.css" />
</head>

<body>
  <main class="loading-shell" aria-labelledby="loadingTitle">
    <section class="loading-card">
      <div class="one-mark" aria-hidden="true">ONE</div>

      <h1 id="loadingTitle" class="loading-title">Mission in progress</h1>

      <p class="mission-name" id="missionName">Preparing your mission</p>

      <div class="progress-wrap" aria-hidden="true">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="loading-message" id="loadingMessage" role="status" aria-live="polite">
        Understanding your dream...
      </div>

      <div class="loading-steps" aria-label="Mission preparation steps">
        <div class="loading-step is-active">
          <span></span>
          <strong>Understanding your dream</strong>
        </div>

        <div class="loading-step">
          <span></span>
          <strong>Exploring every possibility</strong>
        </div>

        <div class="loading-step">
          <span></span>
          <strong>Finding trusted providers</strong>
        </div>

        <div class="loading-step">
          <span></span>
          <strong>Preparing everything</strong>
        </div>

        <div class="loading-step">
          <span></span>
          <strong>Turning your idea into reality</strong>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="loading.js?v=20260711-2"></script>
</body>
</html>
