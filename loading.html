<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kastiz ONE is preparing your mission." />
  <meta name="theme-color" content="#ffffff" />
  <script>try{const t=localStorage.getItem("kastiz-one-theme")||"light";document.documentElement.dataset.theme=t;const s=document.createElement("style");s.id="theme-boot";s.textContent=`html,body{background:${t==="midnight"?"#121315":t==="gray"?"#3f4146":"#ffffff"}!important}`;document.head.appendChild(s);addEventListener("DOMContentLoaded",()=>s.remove(),{once:true})}catch{}</script>
  <title>Kastiz ONE — Preparing Mission</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="loading.css?v=20260715-60" />
</head>

<body>
  <main class="loading-shell" aria-labelledby="loadingTitle">
    <section class="loading-card">
      <div class="one-mark" aria-hidden="true">
        <img src="assets/one-final-circle.png?v=20260713-20" alt="" />
        <strong>NE</strong>
      </div>

      <h1 id="loadingTitle" class="loading-title">ONE is preparing your mission...</h1>

      <p class="mission-name" id="missionName">Preparing your mission</p>

      <div class="loading-message" id="loadingMessage" role="status" aria-live="polite">
        Understanding your goal...
      </div>

      <div class="loading-steps" aria-label="Mission preparation steps">
        <div class="loading-step is-active">
          <span></span>
          <strong>Understanding your goal</strong>
        </div>

        <div class="loading-step">
          <span></span>
          <strong>Collecting live information</strong>
        </div>

        <div class="loading-step">
          <span></span>
          <strong>Comparing available options</strong>
        </div>

        <div class="loading-step">
          <span></span>
          <strong>Organizing your mission</strong>
        </div>

        <div class="loading-step">
          <span></span>
          <strong>Almost ready</strong>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="loading.js?v=20260722-location-restore"></script>
</body>
</html>
