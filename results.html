<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kastiz ONE has prepared your mission." />
  <meta name="theme-color" content="#ffffff" />
  <title>Kastiz ONE — Mission Ready</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;650;700;750;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="results.css?v=20260712-2" />
</head>

<body>
  <div class="results-shell">
    <header class="results-header">
      <a href="index.html" class="brand" aria-label="Kastiz ONE home">
        <img src="assets/one-circle-mark-graffiti.png?v=20260713-6" alt="" aria-hidden="true" />
      </a>

      <div class="header-actions">
        <a href="upgrade.html" class="header-link" data-i18n="upgrade">Upgrade</a>
        <a href="login.html" class="header-link" data-i18n="login">Login</a>
      </div>
    </header>

    <main class="mission-layout">
      <section class="mission-hero">
        <div>
          <p class="eyebrow" data-i18n="missionReady">Mission Ready</p>
          <h1 id="missionTitle">Mission Plan</h1>
        </div>

        <div class="mission-status-card">
          <span class="status-dot"></span>
          <span data-i18n="preparedByOne">Prepared by ONE</span>
        </div>
      </section>

      <section class="mission-grid" id="missionGrid" aria-label="Prepared mission plan"></section>

      <section class="bottom-actions" id="bottomActions" aria-label="Mission actions">
        <button class="primary-action" id="makeRealityButton" type="button">
          <span data-i18n="makeItReality">Make It Reality</span>
          <small><img src="assets/one-circle-mark-graffiti.png?v=20260713-6" alt="" /><span data-i18n="withOne">with ONE</span></small>
        </button>
      </section>

      <section class="approval-panel" id="approvalPanel" aria-label="Mission approval progress" hidden>
        <div class="approval-header">
          <p class="approval-kicker" data-i18n="missionApproved">Mission Approved</p>
          <h2 id="approvalTitle" data-i18n="oneIsWorking">ONE is making it happen.</h2>
        </div>

        <div class="approval-list" id="approvalList"></div>

        <div class="completion-message" id="completionMessage" hidden>
          <h3 data-i18n="finalMessage">Your future is now in motion.</h3>
          <p>— ONE —</p>

          <div class="return-home">
            <span id="returnCountdown">Returning to Home in 60 seconds...</span>
            <button type="button" id="returnHomeButton" data-i18n="returnHomeNow">Return Home Now</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="footer-left">
        <span id="locationText">South Korea</span>
        <a href="#" data-i18n="partners">Partners</a>
        <a href="#" data-i18n="business">Business</a>
        <a href="#" data-i18n="developers">Developers</a>
      </div>

      <div class="footer-center">
        <span data-i18n="poweredBy">Powered by Kastiz</span>
      </div>

      <div class="footer-right">
        <a href="#" data-i18n="privacy">Privacy</a>
        <a href="#" data-i18n="terms">Terms</a>
        <a href="settings.html" data-i18n="settings">Settings</a>
      </div>
    </footer>
  </div>

  <script type="module" src="results.js?v=20260712-5"></script>
</body>
</html>
